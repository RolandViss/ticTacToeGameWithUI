<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tic-Tac-Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
    <style>
        :root {
          --bg: #0a0a0f;
          --surface: #12121a;
          --panel: #1a1a26;
          --accent-x: #ff3c5f;
          --accent-o: #00e5ff;
          --grid-line: #2a2a3a;
          --text: #e0e0f0;
          --muted: #555570;
          --win-glow-x: 0 0 30px #ff3c5f88;
          --win-glow-o: 0 0 30px #00e5ff88;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: 'Space Mono', monospace;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          position: relative;
        }

        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background-image:
            linear-gradient(var(--grid-line) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
          background-size: 48px 48px;
          opacity: 0.3;
          animation: gridDrift 20s linear infinite;
          pointer-events: none;
        }

        @keyframes gridDrift {
          0% { background-position: 0 0; }
          100% { background-position: 48px 48px; }
        }

        .orb {
          position: fixed;
          border-radius: 50%;
          filter: blur(80px);
          pointer-events: none;
          opacity: 0.12;
          animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--accent-x); top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 350px; height: 350px; background: var(--accent-o); bottom: -80px; right: -80px; animation-delay: -4s; }

        @keyframes orbFloat {
          0%, 100% { transform: translate(0, 0) scale(1); }
          50% { transform: translate(30px, 20px) scale(1.1); }
        }

        .wrapper {
          position: relative;
          z-index: 10;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 0;
          animation: wrapIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes wrapIn {
          from { opacity: 0; transform: translateY(40px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .screen { display: none; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }

        .title {
          font-family: 'Bebas Neue', cursive;
          font-size: clamp(52px, 10vw, 88px);
          letter-spacing: 6px;
          line-height: 1;
          text-align: center;
          margin-bottom: 6px;
          background: linear-gradient(135deg, var(--accent-x), var(--accent-o));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          filter: drop-shadow(0 0 30px #ff3c5f44);
        }

        .subtitle {
          font-size: 11px;
          letter-spacing: 5px;
          color: var(--muted);
          text-transform: uppercase;
          margin-bottom: 48px;
        }

        .menu-options {
          display: flex;
          flex-direction: column;
          gap: 12px;
          width: 300px;
        }

        .menu-btn {
          background: var(--panel);
          border: 1px solid var(--grid-line);
          color: var(--text);
          font-family: 'Space Mono', monospace;
          font-size: 13px;
          letter-spacing: 2px;
          padding: 16px 24px;
          cursor: pointer;
          position: relative;
          overflow: hidden;
          transition: border-color 0.3s, transform 0.15s;
          text-transform: uppercase;
        }

        .menu-btn::before {
          content: '';
          position: absolute;
          inset: 0;
          background: linear-gradient(90deg, var(--accent-x), var(--accent-o));
          opacity: 0;
          transition: opacity 0.3s;
        }

        .menu-btn:hover { border-color: var(--accent-x); transform: translateX(4px); }
        .menu-btn:hover::before { opacity: 0.08; }
        .menu-btn:active { transform: translateX(2px) scale(0.99); }
        .menu-btn span { position: relative; z-index: 1; }
        .menu-num { color: var(--accent-x); margin-right: 12px; font-size: 10px; }

        .game-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          width: 380px;
          margin-bottom: 24px;
        }

        .player-card {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 6px;
          padding: 12px 18px;
          border: 1px solid var(--grid-line);
          background: var(--panel);
          min-width: 110px;
          transition: border-color 0.3s, box-shadow 0.3s;
          position: relative;
        }

        .player-card.active-x { border-color: var(--accent-x); box-shadow: var(--win-glow-x); }
        .player-card.active-o { border-color: var(--accent-o); box-shadow: var(--win-glow-o); }
        .player-card .p-mark { font-family: 'Bebas Neue', cursive; font-size: 32px; line-height: 1; }
        .player-card.x-card .p-mark { color: var(--accent-x); }
        .player-card.o-card .p-mark { color: var(--accent-o); }

        .player-card .p-name {
          font-size: 10px;
          letter-spacing: 2px;
          color: var(--muted);
          text-transform: uppercase;
          max-width: 90px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .player-card .p-type { font-size: 9px; letter-spacing: 1px; color: var(--muted); opacity: 0.6; }
        .vs-label { font-family: 'Bebas Neue', cursive; font-size: 24px; color: var(--muted); letter-spacing: 3px; }

        .score-row { display: flex; gap: 32px; margin-bottom: 20px; align-items: center; }
        .score-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .score-label { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
        .score-val { font-family: 'Bebas Neue', cursive; font-size: 28px; line-height: 1; }
        .score-val.x-score { color: var(--accent-x); }
        .score-val.o-score { color: var(--accent-o); }
        .score-val.d-score { color: var(--muted); }

        .board-container { position: relative; width: 360px; height: 360px; margin-bottom: 20px; }

        .board {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          grid-template-rows: repeat(3, 1fr);
          width: 100%;
          height: 100%;
          gap: 3px;
          background: var(--grid-line);
          border: 1px solid var(--grid-line);
        }

        .cell {
          background: var(--surface);
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          font-family: 'Bebas Neue', cursive;
          font-size: 80px;
          line-height: 1;
          transition: background 0.15s, transform 0.1s;
          position: relative;
          overflow: hidden;
          user-select: none;
        }

        .cell::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.2s; }
        .cell:not(.taken):not(.locked):hover { background: var(--panel); transform: scale(0.97); }
        .cell.locked { cursor: not-allowed; opacity: 0.7; }
        .cell.x-cell { color: var(--accent-x); animation: cellPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .cell.o-cell { color: var(--accent-o); animation: cellPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .cell.win-cell { animation: winPulse 0.5s ease both; }

        @keyframes cellPop {
          from { transform: scale(0.3); opacity: 0; }
          to { transform: scale(1); opacity: 1; }
        }

        @keyframes winPulse {
          0% { transform: scale(1); }
          40% { transform: scale(1.08); }
          100% { transform: scale(1); }
        }

        .cell.win-x { background: #ff3c5f18; box-shadow: inset 0 0 30px #ff3c5f33; }
        .cell.win-o { background: #00e5ff18; box-shadow: inset 0 0 30px #00e5ff33; }

        .status-bar {
          height: 44px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 13px;
          letter-spacing: 3px;
          text-transform: uppercase;
          color: var(--muted);
          transition: color 0.3s;
          margin-bottom: 16px;
          text-align: center;
        }

        .status-bar.win-x { color: var(--accent-x); text-shadow: var(--win-glow-x); }
        .status-bar.win-o { color: var(--accent-o); text-shadow: var(--win-glow-o); }
        .status-bar.draw { color: var(--text); }
        .status-bar.error { color: #ffaa00; }

        .action-row { display: flex; gap: 10px; }

        .action-btn {
          background: transparent;
          border: 1px solid var(--grid-line);
          color: var(--muted);
          font-family: 'Space Mono', monospace;
          font-size: 10px;
          letter-spacing: 2px;
          padding: 10px 18px;
          cursor: pointer;
          text-transform: uppercase;
          transition: border-color 0.2s, color 0.2s;
        }

        .action-btn:hover { border-color: var(--text); color: var(--text); }
        .action-btn.primary { border-color: var(--accent-x); color: var(--accent-x); }
        .action-btn.primary:hover { background: var(--accent-x); color: var(--bg); }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

        .setup-title {
          font-family: 'Bebas Neue', cursive;
          font-size: 36px;
          letter-spacing: 4px;
          margin-bottom: 32px;
          color: var(--accent-o);
        }

        .setup-form { display: flex; flex-direction: column; gap: 16px; width: 300px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-label { font-size: 9px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }

        .form-input {
          background: var(--panel);
          border: 1px solid var(--grid-line);
          color: var(--text);
          font-family: 'Space Mono', monospace;
          font-size: 13px;
          padding: 12px 14px;
          outline: none;
          transition: border-color 0.2s;
          letter-spacing: 1px;
        }

        .form-input:focus { border-color: var(--accent-o); }

        .form-btn {
          background: linear-gradient(135deg, var(--accent-x), var(--accent-o));
          border: none;
          color: var(--bg);
          font-family: 'Space Mono', monospace;
          font-size: 12px;
          letter-spacing: 3px;
          padding: 14px;
          cursor: pointer;
          text-transform: uppercase;
          font-weight: 700;
          margin-top: 8px;
          transition: opacity 0.2s, transform 0.15s;
        }

        .form-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .form-btn:active { transform: translateY(0); }

        .back-link {
          margin-top: 16px;
          font-size: 10px;
          letter-spacing: 2px;
          color: var(--muted);
          cursor: pointer;
          text-transform: uppercase;
          text-decoration: underline;
          transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        .thinking {
          display: none;
          position: absolute;
          inset: 0;
          background: rgba(10, 10, 15, 0.6);
          align-items: center;
          justify-content: center;
          z-index: 20;
          backdrop-filter: blur(2px);
        }
        .thinking.visible { display: flex; }

        .thinking-text {
          font-size: 11px;
          letter-spacing: 4px;
          color: var(--accent-o);
          text-transform: uppercase;
          animation: blink 1s step-end infinite;
        }

        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }

        /* API config badge */
        .api-badge {
          position: fixed;
          bottom: 18px;
          right: 18px;
          font-size: 9px;
          letter-spacing: 2px;
          color: var(--muted);
          border: 1px solid var(--grid-line);
          padding: 6px 10px;
          background: var(--panel);
          z-index: 100;
          text-transform: uppercase;
        }
        .api-badge span { color: var(--accent-o); }
    </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="api-badge">API: <span id="api-base-display">localhost:8080</span></div>

<div class="wrapper">

    <!-- ── MENU ── -->
    <div class="screen active" id="screen-menu">
        <div class="title">TIC<br/>TAC<br/>TOE</div>
        <div class="subtitle">Select Game Mode</div>
        <div class="menu-options">
            <button class="menu-btn" onclick="startSetup('HVH')">
                <span><span class="menu-num">01.</span> Human vs Human</span>
            </button>
            <button class="menu-btn" onclick="startSetup('HVC')">
                <span><span class="menu-num">02.</span> Human vs Computer</span>
            </button>
            <button class="menu-btn" onclick="startSetup('CVC')">
                <span><span class="menu-num">03.</span> Computer vs Computer</span>
            </button>
        </div>
    </div>

    <!-- ── SETUP ── -->
    <div class="screen" id="screen-setup">
        <div class="setup-title">Player Setup</div>
        <div class="setup-form" id="setup-form"></div>
        <div class="back-link" onclick="showScreen('screen-menu')">← Back to menu</div>
    </div>

    <!-- ── GAME ── -->
    <div class="screen" id="screen-game">
        <div class="game-header">
            <div class="player-card x-card" id="card-x">
                <div class="p-mark">X</div>
                <div class="p-name" id="name-x">Player 1</div>
                <div class="p-type" id="type-x">Human</div>
            </div>
            <div class="vs-label">VS</div>
            <div class="player-card o-card" id="card-o">
                <div class="p-mark">O</div>
                <div class="p-name" id="name-o">Player 2</div>
                <div class="p-type" id="type-o">Human</div>
            </div>
        </div>

        <div class="score-row">
            <div class="score-item">
                <div class="score-val x-score" id="score-x">0</div>
                <div class="score-label">X wins</div>
            </div>
            <div class="score-item">
                <div class="score-val d-score" id="score-d">0</div>
                <div class="score-label">Draws</div>
            </div>
            <div class="score-item">
                <div class="score-val o-score" id="score-o">0</div>
                <div class="score-label">O wins</div>
            </div>
        </div>

        <div class="board-container">
            <div class="board" id="board"></div>
            <div class="thinking" id="thinking">
                <div class="thinking-text">Thinking...</div>
            </div>
        </div>

        <div class="status-bar" id="status">Connecting...</div>

        <div class="action-row">
            <button class="action-btn primary" id="btn-new-game" onclick="resetGame()">New Game</button>
            <button class="action-btn" onclick="goToMenu()">Menu</button>
        </div>
    </div>
</div>

<script>
    // ═══════════════════════════════════════════════════════════
    //  ██████╗ ██████╗ ███╗   ██╗███████╗██╗ ██████╗
    // ██╔════╝██╔═══██╗████╗  ██║██╔════╝██║██╔════╝
    // ██║     ██║   ██║██╔██╗ ██║█████╗  ██║██║  ███╗
    // ██║     ██║   ██║██║╚██╗██║██╔══╝  ██║██║   ██║
    // ╚██████╗╚██████╔╝██║ ╚████║██║     ██║╚██████╔╝
    //  ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝╚═╝     ╚═╝ ╚═════╝
    // ═══════════════════════════════════════════════════════════
    //
    //  ── CONFIGURE YOUR JAVA API BASE URL HERE ──────────────
    const API_BASE = 'http://localhost:8080/api';
    //  ───────────────────────────────────────────────────────
    //
    //  EXPECTED JAVA REST API CONTRACT:
    //
    //  POST   /api/game/start
    //    Request:  { mode: "HVH"|"HVC"|"CVC", playerXName: string, playerOName: string }
    //    Response: GameState (see below)
    //
    //  POST   /api/game/{gameId}/move
    //    Request:  { index: 0-8 }   (cell index, row-major: 0=top-left, 8=bot-right)
    //    Response: GameState
    //
    //  POST   /api/game/{gameId}/reset
    //    Request:  {}
    //    Response: GameState
    //
    //  GET    /api/game/{gameId}
    //    Response: GameState
    //
    //  ── GameState shape ─────────────────────────────────────
    //  {
    //    gameId:        string,
    //    board:         string[9],   // each: "X" | "O" | ""
    //    currentPlayer: "X" | "O",
    //    status:        "ONGOING" | "X_WINS" | "O_WINS" | "DRAW",
    //    winner:        "X" | "O" | null,
    //    winCombo:      number[3] | null,  // e.g. [0,1,2] or null
    //    playerXName:   string,
    //    playerOName:   string,
    //    playerXType:   "HUMAN" | "CPU",
    //    playerOType:   "HUMAN" | "CPU",
    //    scores:        { X: number, O: number, D: number }
    //  }
    // ═══════════════════════════════════════════════════════════

    document.getElementById('api-base-display').textContent =
      API_BASE.replace('http://', '').replace('https://', '');

    // ── App State ──────────────────────────────────────────────
    let gameId      = null;
    let gameOver    = false;
    let currentMode = null;
    let isBoardLocked = false;

    // ── Screen Navigation ──────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function goToMenu() {
      gameId   = null;
      gameOver = false;
      showScreen('screen-menu');
    }

    // ── Setup Screen ───────────────────────────────────────────
    function startSetup(mode) {
      currentMode = mode;
      const form = document.getElementById('setup-form');
      form.innerHTML = '';

      const configs = {
        HVH: [
          { label: 'Player X Name', id: 'p1', placeholder: 'Enter name...' },
          { label: 'Player O Name', id: 'p2', placeholder: 'Enter name...' }
        ],
        HVC: [
          { label: 'Your Name (plays as X)', id: 'p1', placeholder: 'Enter your name...' }
        ],
        CVC: []
      };

      configs[mode].forEach(f => {
        form.innerHTML += `
          <div class="form-group">
            <label class="form-label">${f.label}</label>
            <input class="form-input" id="${f.id}" placeholder="${f.placeholder}" maxlength="12"/>
          </div>`;
      });

      form.innerHTML += `<button class="form-btn" onclick="launchGame()">Start Game</button>`;
      showScreen('screen-setup');
      setTimeout(() => { const el = form.querySelector('input'); if (el) el.focus(); }, 100);
    }

    // ── Launch Game → POST /api/game/start ─────────────────────
    async function launchGame() {
      const getVal = (id, fallback) => {
        const el = document.getElementById(id);
        return el && el.value.trim() ? el.value.trim() : fallback;
      };

      const playerXName = getVal('p1', currentMode === 'CVC' ? 'CPU-α' : 'Player X');
      const playerOName = getVal('p2', currentMode === 'HVC' ? 'CPU'   :
                                       currentMode === 'CVC' ? 'CPU-β' : 'Player O');

      buildBoard();
      showScreen('screen-game');
      setStatus('Connecting...', '');
      lockBoard(true);

      try {
        const state = await apiPost('/game/start', {
          mode: currentMode,
          playerXName,
          playerOName
        });
        applyState(state);
      } catch (e) {
        setStatus('API Error — check console', 'error');
        console.error('[TicTacToe] /game/start failed:', e);
      }
    }

    // ── Cell Click → POST /api/game/{id}/move ──────────────────
    async function onCellClick(index) {
      if (gameOver || isBoardLocked || !gameId) return;

      const cell = document.querySelectorAll('.cell')[index];
      if (cell.classList.contains('taken')) return;

      lockBoard(true);

      try {
        const state = await apiPost(`/game/${gameId}/move`, { index });
        applyState(state);
      } catch (e) {
        setStatus('Move failed — try again', 'error');
        console.error('[TicTacToe] /move failed:', e);
        lockBoard(false);
      }
    }

    // ── Reset Game → POST /api/game/{id}/reset ─────────────────
    async function resetGame() {
      if (!gameId) return;

      lockBoard(true);
      setStatus('Loading...', '');

      try {
        const state = await apiPost(`/game/${gameId}/reset`, {});
        renderBoard([]);          // clear visuals first
        applyState(state);
      } catch (e) {
        setStatus('Reset failed — try again', 'error');
        console.error('[TicTacToe] /reset failed:', e);
        lockBoard(false);
      }
    }

    // ── Apply API State to UI ───────────────────────────────────
    function applyState(state) {
      if (!state) return;

      gameId   = state.gameId;
      gameOver = state.status !== 'ONGOING';

      // Player info
      document.getElementById('name-x').textContent = state.playerXName || 'Player X';
      document.getElementById('name-o').textContent = state.playerOName || 'Player O';
      document.getElementById('type-x').textContent = (state.playerXType || 'HUMAN').toUpperCase();
      document.getElementById('type-o').textContent = (state.playerOType || 'HUMAN').toUpperCase();

      // Scores
      if (state.scores) {
        document.getElementById('score-x').textContent = state.scores.X ?? 0;
        document.getElementById('score-o').textContent = state.scores.O ?? 0;
        document.getElementById('score-d').textContent = state.scores.D ?? 0;
      }

      // Board cells
      renderBoard(state.board || []);

      // Win highlight
      if (state.winCombo && state.winner) {
        highlightWinCells(state.winCombo, state.winner);
      }

      // Status & card highlight
      switch (state.status) {
        case 'X_WINS':
          setStatus(`${state.playerXName} wins!`, 'win-x');
          highlightActiveCard(null);
          lockBoard(true);
          break;
        case 'O_WINS':
          setStatus(`${state.playerOName} wins!`, 'win-o');
          highlightActiveCard(null);
          lockBoard(true);
          break;
        case 'DRAW':
          setStatus("It's a draw!", 'draw');
          highlightActiveCard(null);
          lockBoard(true);
          break;
        case 'ONGOING':
        default: {
          const cur = state.currentPlayer || 'X';
          const curName = cur === 'X' ? state.playerXName : state.playerOName;
          const curType = cur === 'X'
            ? (state.playerXType || 'HUMAN')
            : (state.playerOType || 'HUMAN');

          highlightActiveCard(cur);

          if (curType.toUpperCase() === 'CPU') {
            // CPU is moving on the server — show thinking overlay & poll
            setStatus('CPU is thinking...', '');
            showThinking(true);
            lockBoard(true);
            pollForCpuMove();
          } else {
            setStatus(`${curName}'s turn [${cur}]`, '');
            showThinking(false);
            lockBoard(false);
          }
          break;
        }
      }
    }

    // ── Poll for CPU Move → GET /api/game/{id} ─────────────────
    //    Called when currentPlayerType === CPU and game is ONGOING.
    //    Polls every 600ms until the state changes from CPU's turn.
    async function pollForCpuMove() {
      if (!gameId) return;
      const pollInterval = setInterval(async () => {
        try {
          const state = await apiFetch(`/game/${gameId}`);
          const curType = state.currentPlayer === 'X'
            ? state.playerXType
            : state.playerOType;

          const cpuStillThinking =
            state.status === 'ONGOING' && curType.toUpperCase() === 'CPU';

          if (!cpuStillThinking) {
            clearInterval(pollInterval);
            showThinking(false);
            applyState(state);
          }
        } catch (e) {
          clearInterval(pollInterval);
          showThinking(false);
          setStatus('Polling error — check console', 'error');
          console.error('[TicTacToe] poll /game failed:', e);
        }
      }, 600);
    }

    // ── Board Rendering ────────────────────────────────────────
    function buildBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.addEventListener('click', () => onCellClick(i));
        board.appendChild(cell);
      }
    }

    // board = string[9], each "X" | "O" | ""
    function renderBoard(board) {
      document.querySelectorAll('.cell').forEach((cell, i) => {
        const val = board[i] || '';
        cell.className = 'cell';
        cell.textContent = '';
        if (val === 'X') {
          cell.textContent = 'X';
          cell.classList.add('x-cell', 'taken');
        } else if (val === 'O') {
          cell.textContent = 'O';
          cell.classList.add('o-cell', 'taken');
        }
      });
    }

    function highlightWinCells(combo, mark) {
      if (!combo) return;
      const cells = document.querySelectorAll('.cell');
      combo.forEach(i => {
        cells[i].classList.add('win-cell', mark === 'X' ? 'win-x' : 'win-o');
      });
    }

    function lockBoard(locked) {
      isBoardLocked = locked;
      document.querySelectorAll('.cell').forEach(c => {
        if (locked) c.classList.add('locked');
        else if (!c.classList.contains('taken')) c.classList.remove('locked');
      });
      document.getElementById('btn-new-game').disabled = locked && !gameOver;
    }

    // ── UI Helpers ─────────────────────────────────────────────
    function setStatus(text, cls = '') {
      const el = document.getElementById('status');
      el.className = 'status-bar ' + cls;
      el.textContent = text;
    }

    function highlightActiveCard(mark) {
      document.getElementById('card-x').className =
        'player-card x-card' + (mark === 'X' ? ' active-x' : '');
      document.getElementById('card-o').className =
        'player-card o-card' + (mark === 'O' ? ' active-o' : '');
    }

    function showThinking(visible) {
      document.getElementById('thinking').classList.toggle('visible', visible);
    }

    // ── API Helpers ────────────────────────────────────────────
    async function apiPost(endpoint, body) {
      const res = await fetch(`${API_BASE}${endpoint}`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body:    JSON.stringify(body)
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`HTTP ${res.status}: ${text}`);
      }
      return res.json();
    }

    async function apiFetch(endpoint) {
      const res = await fetch(`${API_BASE}${endpoint}`, {
        headers: { 'Accept': 'application/json' }
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`HTTP ${res.status}: ${text}`);
      }
      return res.json();
    }

    // ── Keyboard shortcut ──────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' &&
          document.getElementById('screen-setup').classList.contains('active')) {
        launchGame();
      }
    });
</script>
</body>
</html>
