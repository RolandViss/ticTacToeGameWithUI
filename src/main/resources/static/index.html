<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tic Tac Toe</title>
    <style>
        :root{
          --bg:#0b0f19;
          --text:#e8edf7;
          --muted:#98a3b8;
          --x:#6ee7ff;
          --o:#ff8bd3;
          --ok:#36d399;
          --bad:#f87272;
          --warn:#fbbf24;
          --border:rgba(255,255,255,.10);
          --shadow: 0 10px 30px rgba(0,0,0,.35);
          --radius:18px;
        }
        *{box-sizing:border-box}
        html,body{height:100%}
        body{
          margin:0;
          font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
          background: radial-gradient(1000px 500px at 20% 0%, rgba(110,231,255,.12), transparent 55%),
                      radial-gradient(900px 500px at 80% 10%, rgba(255,139,211,.10), transparent 55%),
                      radial-gradient(900px 700px at 50% 100%, rgba(54,211,153,.08), transparent 60%),
                      var(--bg);
          color:var(--text);
          display:flex;
          align-items:center;
          justify-content:center;
          padding:22px;
        }
        .app{ width:min(1020px, 100%); display:grid; gap:16px; }

        /* ── Proposal D topbar ── */
        .topbar{
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 14px 20px;
          background: rgba(255,255,255,.04);
          backdrop-filter: blur(18px);
          -webkit-backdrop-filter: blur(18px);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          box-shadow: var(--shadow);
          overflow: hidden;
        }
        .topbar::before{
          content: "";
          position: absolute;
          inset: 0 0 auto 0;
          height: 2px;
          background: linear-gradient(90deg, transparent, var(--x), var(--o), transparent);
          border-radius: var(--radius) var(--radius) 0 0;
        }
        .topbar-marks{
          display: flex;
          align-items: center;
          gap: 14px;
        }
        .topbar-mark{
          width: 32px; height: 32px;
          border-radius: 10px;
          display: flex; align-items: center; justify-content: center;
          font-size: 15px; font-weight: 900;
          border: 1px solid var(--border);
        }
        .topbar-mark.x{ color: var(--x); background: rgba(110,231,255,.08); border-color: rgba(110,231,255,.30); }
        .topbar-mark.o{ color: var(--o); background: rgba(255,139,211,.08); border-color: rgba(255,139,211,.30); }
        .topbar-title{
          font-size: 24px;
          font-weight: 800;
          letter-spacing: .4px;
          color: var(--text);
          margin: 0 18px;
        }

        .grid{ display:grid; grid-template-columns: 380px 1fr; gap:16px; }
        @media (max-width: 920px){ .grid{ grid-template-columns: 1fr; } }

        .card{
          background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
          border:1px solid var(--border);
          border-radius: var(--radius);
          box-shadow: var(--shadow);
          padding:16px;
        }
        .card h2{ margin:0 0 10px; font-size:14px; letter-spacing:.3px; color: rgba(232,237,247,.92); }
        .muted{color:var(--muted)}
        .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
        .row + .row{margin-top:10px}

        .modes{display:grid; gap:10px;}
        .modeBtn{
          display:flex; align-items:center; justify-content:space-between;
          gap:12px; padding:12px 12px;
          border-radius: 14px;
          border:1px solid var(--border);
          background: rgba(255,255,255,.04);
          color:var(--text);
          cursor:pointer;
          transition: transform .08s ease, background .12s ease, border-color .12s ease;
          text-align:left;
        }
        .modeBtn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.06);}
        .modeBtn.selected{ border-color: rgba(110,231,255,.45); background: rgba(110,231,255,.08); }
        .modeLeft{display:flex; flex-direction:column; gap:2px; min-width:0}
        .modeTitle{font-weight:800; font-size:13px}
        .modeDesc{font-size:12px; color:var(--muted)}
        .badge{
          font-size:11px; color: rgba(232,237,247,.85);
          border:1px solid var(--border);
          padding:6px 10px;
          border-radius:999px;
          background: rgba(255,255,255,.04);
          white-space:nowrap;
        }

        .pill{
          font-size:11px;
          color: rgba(232,237,247,.88);
          border:1px solid var(--border);
          padding:6px 10px;
          border-radius:999px;
          background: rgba(255,255,255,.04);
          white-space:nowrap;
          max-width:100%;
          overflow:hidden;
          text-overflow:ellipsis;
        }
        .pill.x{ border-color: rgba(110,231,255,.45); background: rgba(110,231,255,.10); }
        .pill.o{ border-color: rgba(255,139,211,.45); background: rgba(255,139,211,.10); }

        .fields{display:grid; gap:10px; margin-top:10px}
        label{font-size:12px; color:var(--muted)}
        input{
          width:100%;
          padding:10px 12px;
          border-radius: 12px;
          border:1px solid var(--border);
          background: rgba(0,0,0,.18);
          color:var(--text);
          outline:none;
        }
        input:focus{ border-color: rgba(110,231,255,.5); box-shadow: 0 0 0 4px rgba(110,231,255,.10); }

        .btnRow{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap}
        button{
          padding:10px 12px;
          border-radius: 12px;
          border:1px solid var(--border);
          background: rgba(255,255,255,.05);
          color:var(--text);
          cursor:pointer;
          font-weight:800;
          transition: transform .08s ease, background .12s ease, border-color .12s ease;
        }
        button:hover{ transform: translateY(-1px); background: rgba(255,255,255,.07); }
        button.primary{ border-color: rgba(54,211,153,.55); background: rgba(54,211,153,.12);}
        button.danger{ border-color: rgba(248,114,114,.55); background: rgba(248,114,114,.10);}
        button:disabled{opacity:.55; cursor:not-allowed; transform:none}

        .boardWrap{display:grid; gap:12px;}
        .hud{
          display:flex; align-items:center;
          gap:10px; flex-wrap:wrap;
          padding:10px 12px;
          border-radius: 14px;
          border:1px solid var(--border);
          background: rgba(255,255,255,.04);
        }
        .turn{ display:flex; align-items:center; gap:10px; font-size:13px; min-width:0; }
        .turnText{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

        .board{
          aspect-ratio: 1 / 1;
          width: min(560px, 100%);
          margin-inline:auto;
          display:grid;
          grid-template-columns: repeat(3, 1fr);
          gap:10px;
          padding:10px;
          border-radius: var(--radius);
          border:1px solid var(--border);
          background: rgba(255,255,255,.03);
        }
        .cell{
          display:flex; align-items:center; justify-content:center;
          font-size:52px; font-weight:1000;
          border-radius: 16px;
          border:1px solid var(--border);
          background: rgba(0,0,0,.18);
          cursor:pointer;
          user-select:none;
          transition: transform .08s ease, background .12s ease, border-color .12s ease;
        }
        .cell:hover{ transform: translateY(-1px); background: rgba(255,255,255,.05); }
        .cell.taken{ cursor:not-allowed; }
        .cell.x{ color: var(--x); border-color: rgba(110,231,255,.35); background: rgba(110,231,255,.06); }
        .cell.o{ color: var(--o); border-color: rgba(255,139,211,.35); background: rgba(255,139,211,.06); }

        .overlay{
          position:fixed; inset:0;
          display:none; align-items:center; justify-content:center;
          background: rgba(0,0,0,.55);
          backdrop-filter: blur(6px);
          padding:22px;
        }
        .overlay.show{ display:flex; }
        .modal{
          width:min(520px, 100%);
          border-radius: 22px;
          border:1px solid var(--border);
          background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
          box-shadow: 0 20px 60px rgba(0,0,0,.5);
          padding:18px;
        }
        .modalTop{display:flex; justify-content:space-between; gap:10px; align-items:center}
        .modal h3{margin:0; font-size:16px}
        .modal p{margin:6px 0 0; color:var(--muted); font-size:13px}
        .bigMark{
          width:56px; height:56px;
          border-radius: 18px;
          display:flex; align-items:center; justify-content:center;
          font-size:28px; font-weight:1000;
          border:1px solid var(--border);
          background: rgba(255,255,255,.05);
        }
        .bigMark.x{ color:var(--x); border-color: rgba(110,231,255,.35); background: rgba(110,231,255,.08); }
        .bigMark.o{ color:var(--o); border-color: rgba(255,139,211,.35); background: rgba(255,139,211,.08); }
        .bigMark.d{ color: rgba(232,237,247,.85); }

        .sep{height:1px; background: var(--border); margin:14px 0}
    </style>
</head>

<body>
<div class="app">

    <!-- Header: Proposal D — no server status -->
    <div class="topbar">
        <div class="topbar-marks">
            <div class="topbar-mark x">X</div>
            <span class="topbar-title">Tic Tac Toe</span>
            <div class="topbar-mark o">O</div>
        </div>
    </div>

    <div class="grid">
        <!-- LEFT -->
        <div class="card">
            <h2>Setup</h2>

            <div class="modes" id="modeGrid">
                <button class="modeBtn" data-mode="HH" type="button">
                    <div class="modeLeft">
                        <div class="modeTitle">Human vs Human</div>
                        <div class="modeDesc">Two players (X and O)</div>
                    </div>
                    <span class="badge">HH</span>
                </button>

                <button class="modeBtn" data-mode="HC" type="button">
                    <div class="modeLeft">
                        <div class="modeTitle">Human vs CPU</div>
                        <div class="modeDesc">You (X) vs CPU (O)</div>
                    </div>
                    <span class="badge">HC</span>
                </button>

                <button class="modeBtn" data-mode="CC" type="button">
                    <div class="modeLeft">
                        <div class="modeTitle">CPU vs CPU</div>
                        <div class="modeDesc">SSE push animation</div>
                    </div>
                    <span class="badge">CC</span>
                </button>
            </div>

            <div class="sep"></div>

            <div class="fields" id="nameFields"></div>

            <div class="btnRow">
                <button class="primary" id="startBtn" type="button" disabled>Start</button>
                <button id="playAgainBtn" type="button" disabled>Play again</button>
                <button class="danger" id="resetBtn" type="button" disabled>Reset</button>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="card boardWrap">
            <div class="hud">
                <div class="turn">
                    <span class="pill" id="turnPill">—</span>
                    <span class="turnText muted" id="turnText">Select a mode and start</span>
                </div>
            </div>

            <div class="board" id="board" aria-label="Tic Tac Toe board"></div>
        </div>
    </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modalTop">
            <div>
                <h3 id="resultTitle">Game Over</h3>
                <p id="resultMsg">—</p>
            </div>
            <div class="bigMark d" id="resultMark">—</div>
        </div>
        <div class="sep"></div>
        <div class="btnRow" style="justify-content:flex-end">
            <button id="closeOverlayBtn" type="button">Close</button>
            <button class="primary" id="overlayPlayAgainBtn" type="button">Play again</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:8080";

    const MODE_META = {
      HH: { badge: "H vs H",    humans: { X: true,  O: true  }, p1Default: "Player 1", p2Default: "Player 2" },
      HC: { badge: "H vs CPU",  humans: { X: true,  O: false }, p1Default: "Player 1", p2Default: "CPU"      },
      CC: { badge: "CPU vs CPU",humans: { X: false, O: false }, p1Default: "CPU X",    p2Default: "CPU O"    },
    };

    let pendingMode   = null;
    let currentMode   = null;
    let sessionId     = null;
    let sse           = null;
    let boardLocked   = true;
    let gameOverShown = false;

    let names = { X: "Player X", O: "Player O" };

    const $ = (id) => document.getElementById(id);

    const modeGrid    = $("modeGrid");
    const nameFields  = $("nameFields");

    const startBtn     = $("startBtn");
    const playAgainBtn = $("playAgainBtn");
    const resetBtn     = $("resetBtn");

    const turnPill = $("turnPill");
    const turnText = $("turnText");

    const boardEl = $("board");

    const overlay             = $("overlay");
    const resultTitle         = $("resultTitle");
    const resultMsg           = $("resultMsg");
    const resultMark          = $("resultMark");
    const closeOverlayBtn     = $("closeOverlayBtn");
    const overlayPlayAgainBtn = $("overlayPlayAgainBtn");

    // Build board cells
    const cells = [];
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.row = String(r);
        cell.dataset.col = String(c);
        cell.addEventListener("click", () => onCellClick(r, c));
        boardEl.appendChild(cell);
        cells.push(cell);
      }
    }

    // Overlay helpers
    function showOverlay(title, msg, mark, kind) {
      if (gameOverShown) return;
      gameOverShown = true;
      resultTitle.textContent = title;
      resultMsg.textContent   = msg;
      resultMark.textContent  = mark;
      resultMark.className    = "bigMark " + (kind || "d");
      overlay.classList.add("show");
    }
    function hideOverlay(){ overlay.classList.remove("show"); }
    closeOverlayBtn.addEventListener("click", hideOverlay);
    overlayPlayAgainBtn.addEventListener("click", async () => { hideOverlay(); await playAgain(); });

    // API helpers
    async function apiGet(path) {
      const res = await fetch(API_BASE + path);
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }
    async function apiPost(path, body) {
      const res = await fetch(API_BASE + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return { error: data.error || `Request failed (${res.status})` };
      return data;
    }

    // Mode selection
    modeGrid.querySelectorAll(".modeBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        modeGrid.querySelectorAll(".modeBtn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        pendingMode = btn.dataset.mode;

        renderNameInputs(pendingMode);

        startBtn.disabled    = false;
        turnText.textContent = "Ready to start";
      });
    });

    function renderNameInputs(mode) {
      const meta = MODE_META[mode];
      nameFields.innerHTML = "";
      if (meta.humans.X) nameFields.appendChild(makeNameField("p1Name", "Player X name", meta.p1Default));
      if (meta.humans.O) nameFields.appendChild(makeNameField("p2Name", "Player O name", meta.p2Default));
    }

    function makeNameField(id, labelText, defaultValue) {
      const wrap  = document.createElement("div");
      const label = document.createElement("label");
      label.htmlFor     = id;
      label.textContent = labelText;

      const input = document.createElement("input");
      input.id        = id;
      input.type      = "text";
      input.maxLength = 18;
      input.value     = defaultValue;
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !startBtn.disabled) startBtn.click();
      });

      wrap.appendChild(label);
      wrap.appendChild(input);
      return wrap;
    }

    // SSE
    function closeStream() {
      if (sse) { try { sse.close(); } catch {} }
      sse = null;
    }

    function openStream(id) {
      closeStream();
      sse = new EventSource(API_BASE + "/api/game/stream?sessionId=" + encodeURIComponent(id));

      sse.addEventListener("state", (evt) => {
        const state = JSON.parse(evt.data);
        applyState(state);
      });

      sse.addEventListener("done", () => {
        // stream complete
      });
    }

    // Start / Play Again / Reset
    startBtn.addEventListener("click", async () => {
      if (!pendingMode) return;
      hideOverlay();

      gameOverShown = false;
      currentMode   = pendingMode;
      const meta    = MODE_META[currentMode];

      resetVisualBoard();

      const p1Name = meta.humans.X ? (($("p1Name")?.value || "").trim() || meta.p1Default) : meta.p1Default;
      const p2Name = meta.humans.O ? (($("p2Name")?.value || "").trim() || meta.p2Default) : meta.p2Default;

      names.X = meta.humans.X ? p1Name : "CPU";
      names.O = meta.humans.O ? p2Name : "CPU";

      const data = await apiPost("/api/game/start", { mode: currentMode, p1Name, p2Name });
      if (data.error) return showOverlay("Error", data.error, "!", "d");

      sessionId = data.sessionId;

      openStream(sessionId);
      applyState(data);

      playAgainBtn.disabled = false;
      resetBtn.disabled     = false;

      boardLocked = (currentMode === "CC");

      if (currentMode === "CC") {
        const r = await apiPost("/api/game/autoPlay", { sessionId });
        if (r.error) showOverlay("Error", r.error, "!", "d");
      } else {
        boardLocked = false;
      }
    });

    playAgainBtn.addEventListener("click", playAgain);
    async function playAgain() {
      if (!currentMode) return;
      hideOverlay();
      startBtn.click();
    }

    resetBtn.addEventListener("click", async () => {
      if (!sessionId) return;
      await apiPost("/api/game/reset", { sessionId }).catch(() => {});
      closeStream();

      sessionId     = null;
      boardLocked   = true;
      gameOverShown = false;

      resetVisualBoard();
      setTurnUI(null, null);

      playAgainBtn.disabled = true;
      resetBtn.disabled     = true;
      turnText.textContent  = "Select a mode and start";
    });

    // Human move
    async function onCellClick(r, c) {
      if (!sessionId || boardLocked) return;
      if (currentMode === "CC") return;

      const idx = r * 3 + c;
      if (cells[idx].classList.contains("taken")) return;

      const res = await apiPost("/api/game/move", { sessionId, row: r, col: c });
      if (res.error) return;

      applyState(res);
    }

    // Render / state
    function resetVisualBoard() {
      cells.forEach(cell => {
        cell.className   = "cell";
        cell.textContent = "";
      });
      turnPill.textContent = "—";
    }

    function applyState(state) {
      if (!state) return;

      if (state.p1Name) names.X = state.p1Name;
      if (state.p2Name) names.O = state.p2Name;

      renderBoard(state.board);
      setTurnUI(state.currentPlayer, state.status);

      if (state.status && state.status !== "ongoing") {
        boardLocked = true;
        handleGameOver(state);
      }
    }

    function renderBoard(board) {
      const flat = Array.isArray(board) ? board : [];
      for (let i = 0; i < 9; i++) {
        const v    = (flat[i] || "").toString().trim().toUpperCase();
        const cell = cells[i];
        cell.className   = "cell";
        cell.textContent = "";
        if (!v) continue;
        cell.textContent = v;
        cell.classList.add("taken");
        if (v === "X") cell.classList.add("x");
        if (v === "O") cell.classList.add("o");
      }
    }

    function setTurnUI(mark, status) {
      const m = (mark || "").toString().trim().toUpperCase();
      if (!m || (m !== "X" && m !== "O")) {
        turnPill.textContent = "—";
        turnPill.className   = "pill";
        if (status && status !== "ongoing") turnText.textContent = "Game finished";
        return;
      }
      const who = (m === "X") ? names.X : names.O;
      turnPill.textContent = m;
      turnPill.className   = "pill " + (m === "X" ? "x" : "o");
      turnText.textContent = `${who}'s turn`;
    }

    function handleGameOver(state) {
      const status     = (state.status || "").toLowerCase();
      const winnerName = state.winner || null;

      if (status === "draw" || !winnerName) {
        showOverlay("Draw", "No winner this round.", "—", "d");
        return;
      }

      const xWin = (winnerName === names.X);
      if (xWin) {
        showOverlay("Game Over", `${winnerName} wins.`, "X", "x");
      } else {
        showOverlay("Game Over", `${winnerName} wins.`, "O", "o");
      }
    }
</script>
</body>
</html>
