<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TIC TAC TOE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="scanlines"></div>
<div class="cursor-dot" id="cursorDot"></div>

<div class="container">

    <!-- ── MENU SCREEN ── -->
    <div class="screen" id="menuScreen">
        <div class="logo-block">
            <div class="logo-tag">Software Engineering</div>
            <div class="logo-title">TIC TAC TOE</div>
            <div class="logo-sub">SELECT GAME MODE</div>
        </div>

        <div class="mode-grid" id="modeGrid">
            <button class="mode-btn" data-mode="HH">
                <span class="mode-icon">👤 👤</span>
                <span class="mode-name">HUMAN<br/>VS HUMAN</span>
            </button>
            <button class="mode-btn" data-mode="HC">
                <span class="mode-icon">👤 🤖</span>
                <span class="mode-name">HUMAN<br/>VS COMPUTER</span>
            </button>
            <button class="mode-btn mode-btn--full" data-mode="CC">
                <span class="mode-icon">🤖 🤖</span>
                <span class="mode-name">COMPUTER VS COMPUTER</span>
            </button>
        </div>

        <!-- Name entry panel (shown after mode selection) -->
        <div class="name-panel hidden" id="namePanel">
            <div class="name-panel-header" id="namePanelHeader">ENTER PLAYER NAMES</div>

            <div class="name-fields" id="nameFields">
                <!-- injected by JS -->
            </div>

            <div class="panel-actions">
                <button class="btn-ghost" id="cancelModeBtn">← BACK</button>
                <button class="btn-launch" id="launchBtn">LAUNCH GAME ▶</button>
            </div>
        </div>

        <div class="server-status checking" id="serverStatus">CHECKING SERVER…</div>
    </div>

    <!-- ── GAME SCREEN ── -->
    <div class="screen hidden" id="gameScreen">
        <div class="game-header">
            <button class="back-btn" id="backBtn">← MENU</button>
            <div class="mode-badge" id="modeBadge">H vs H</div>
        </div>

        <div class="scoreboard">
            <div class="score-card" id="scoreX">
                <div class="score-label" id="labelX">PLAYER 1</div>
                <div class="score-mark x-mark">X</div>
                <div class="score-num" id="scoreXNum">0</div>
            </div>
            <div class="score-divider">
                <div class="vs-text">VS</div>
                <div class="draw-count" id="drawCount">0 draws</div>
            </div>
            <div class="score-card" id="scoreO">
                <div class="score-label" id="labelO">PLAYER 2</div>
                <div class="score-mark o-mark">O</div>
                <div class="score-num" id="scoreONum">0</div>
            </div>
        </div>

        <div class="turn-indicator" id="turnIndicator">X's turn</div>

        <div class="board-wrap">
            <div class="board" id="board">
                <div class="cell" data-row="0" data-col="0"></div>
                <div class="cell" data-row="0" data-col="1"></div>
                <div class="cell" data-row="0" data-col="2"></div>
                <div class="cell" data-row="1" data-col="0"></div>
                <div class="cell" data-row="1" data-col="1"></div>
                <div class="cell" data-row="1" data-col="2"></div>
                <div class="cell" data-row="2" data-col="0"></div>
                <div class="cell" data-row="2" data-col="1"></div>
                <div class="cell" data-row="2" data-col="2"></div>
            </div>

            <div class="result-overlay hidden" id="resultOverlay">
                <div class="result-box">
                    <div class="result-title" id="resultTitle">GAME OVER</div>
                    <div class="result-mark" id="resultMark">X</div>
                    <div class="result-msg"  id="resultMsg">Player claimed victory</div>
                    <div class="result-actions">
                        <button class="btn-primary"   id="playAgainBtn">PLAY AGAIN</button>
                        <button class="btn-secondary" id="menuBtn">MENU</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="index.js"></script>
</body>
</html>
