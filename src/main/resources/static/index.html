<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>TIC TAC TOE // ARCADE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
    <style>
        /* Keep all your existing CSS */
        :root {
            --neon-x: #ff2d6b;
            --neon-o: #00e5ff;
            --neon-green: #39ff14;
            --bg: #050a0f;
            --surface: #0a1520;
            --surface2: #0f1f30;
            --border: #1a3a55;
            --text: #c8dde8;
            --dim: #3a5a6a;
            --yellow: #ffd600;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content:'';
            position:fixed;
            inset:0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,229,255,0.015) 2px,
                rgba(0,229,255,0.015) 4px
            );
            pointer-events:none;
            z-index:9999;
        }

        /* Header */
        header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:14px 28px;
            border-bottom:1px solid var(--border);
            background: linear-gradient(90deg, #050a0f 0%, #0a1a28 50%, #050a0f 100%);
        }

        .logo {
            font-family:'Orbitron', sans-serif;
            font-size:1.1rem;
            font-weight:900;
            letter-spacing:.15em;
            color:var(--neon-o);
            text-shadow: 0 0 16px var(--neon-o);
        }

        .logo span {
            color:var(--neon-x);
            text-shadow:0 0 16px var(--neon-x);
        }

        .status-bar {
            display:flex;
            align-items:center;
            gap:20px;
            font-family:'Share Tech Mono', monospace;
            font-size:.72rem;
            color:var(--dim);
        }

        .status-dot {
            width:8px;
            height:8px;
            border-radius:50%;
            background:#ff4444;
            animation: pulse 1s infinite;
        }

        .status-dot.online {
            background:var(--neon-green);
            animation: glow 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity:1; }
            50% { opacity:.3; }
        }

        @keyframes glow {
            0%, 100% { box-shadow:0 0 8px var(--neon-green); }
            50% { box-shadow:0 0 16px var(--neon-green); }
        }

        /* App Container */
        .app {
            display:flex;
            height: calc(100vh - 50px);
        }

        .left-panel {
            flex:1;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:40px;
            overflow-y:auto;
        }

        /* Menu Screen */
        #menu-screen {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:30px;
        }

        .menu-title {
            font-family:'Orbitron', sans-serif;
            font-size:3rem;
            font-weight:900;
            letter-spacing:.2em;
            text-align:center;
            background: linear-gradient(135deg, var(--neon-o), var(--neon-x), var(--neon-green));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            text-shadow: 0 0 30px rgba(0,229,255,.3);
        }

        .menu-subtitle {
            font-family:'Share Tech Mono', monospace;
            font-size:.8rem;
            letter-spacing:.15em;
            color:var(--dim);
        }

        .mode-selection {
            display:flex;
            flex-direction:column;
            gap:15px;
            width:100%;
            max-width:400px;
        }

        .mode-btn {
            padding:20px;
            border:2px solid var(--border);
            background:var(--surface);
            border-radius:8px;
            cursor:pointer;
            display:flex;
            align-items:center;
            gap:15px;
            transition:all .3s;
            color:var(--text);
        }

        .mode-btn:hover {
            border-color:var(--neon-o);
            box-shadow: 0 0 20px rgba(0,229,255,.2);
            transform:translateX(8px);
        }

        .mode-icon {
            font-size:2rem;
        }

        .mode-info {
            flex:1;
            text-align:left;
        }

        .mode-label {
            font-family:'Orbitron', sans-serif;
            font-weight:700;
            font-size:.9rem;
            letter-spacing:.1em;
        }

        .mode-desc {
            font-family:'Share Tech Mono', monospace;
            font-size:.7rem;
            color:var(--dim);
            margin-top:4px;
        }

        .mode-arrow {
            font-size:1.2rem;
            color:var(--neon-o);
        }

        /* Game Screen */
        #game-screen {
            display:none;
            flex-direction:column;
            width:100%;
            height:100%;
        }

        .game-header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:15px 30px;
            border-bottom:1px solid var(--border);
        }

        .back-btn {
            padding:8px 16px;
            border:1px solid var(--border);
            background:transparent;
            color:var(--text);
            cursor:pointer;
            font-family:'Share Tech Mono', monospace;
            font-size:.7rem;
            border-radius:4px;
            transition:all .2s;
        }

        .back-btn:hover {
            border-color:var(--neon-x);
            color:var(--neon-x);
        }

        .mode-badge {
            font-family:'Orbitron', sans-serif;
            font-weight:700;
            font-size:.8rem;
            padding:6px 12px;
            border:1px solid var(--neon-o);
            border-radius:4px;
            color:var(--neon-o);
            letter-spacing:.08em;
        }

        /* Scoreboard */
        .scoreboard {
            display:flex;
            justify-content:center;
            align-items:center;
            gap:20px;
            padding:20px;
            font-family:'Orbitron', sans-serif;
        }

        .score-card {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            padding:15px 25px;
            border:2px solid var(--border);
            border-radius:6px;
            background:var(--surface);
        }

        .score-card.x-card { border-color:var(--neon-x); }
        .score-card.o-card { border-color:var(--neon-o); }

        .score-label {
            font-size:.7rem;
            letter-spacing:.1em;
            color:var(--dim);
        }

        .score-val {
            font-size:2rem;
            font-weight:900;
        }

        .score-val.x { color:var(--neon-x); text-shadow:0 0 10px var(--neon-x); }
        .score-val.o { color:var(--neon-o); text-shadow:0 0 10px var(--neon-o); }

        .score-divider {
            font-size:.8rem;
            color:var(--dim);
            font-family:'Share Tech Mono', monospace;
        }

        /* Turn Display */
        .turn-display {
            display:flex;
            justify-content:center;
            align-items:center;
            gap:12px;
            padding:15px;
            font-family:'Share Tech Mono', monospace;
        }

        .turn-marker {
            font-size:1.5rem;
            font-weight:900;
            padding:4px 12px;
            border:2px solid;
            border-radius:4px;
            min-width:40px;
            text-align:center;
        }

        .turn-marker.x {
            color:var(--neon-x);
            border-color:var(--neon-x);
            text-shadow:0 0 10px var(--neon-x);
        }

        .turn-marker.o {
            color:var(--neon-o);
            border-color:var(--neon-o);
            text-shadow:0 0 10px var(--neon-o);
        }

        /* Board */
        .board-wrap {
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            padding:30px;
        }

        #board {
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:12px;
            width:300px;
            height:300px;
        }

        .cell {
            background:var(--surface2);
            border:2px solid var(--border);
            border-radius:8px;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:3rem;
            font-weight:900;
            font-family:'Orbitron', sans-serif;
            transition:all .2s;
            user-select:none;
        }

        .cell:hover {
            border-color:var(--neon-green);
            box-shadow: 0 0 15px rgba(57,255,20,.3);
            transform:scale(1.05);
        }

        .cell.x { color:var(--neon-x); text-shadow:0 0 10px var(--neon-x); }
        .cell.o { color:var(--neon-o); text-shadow:0 0 10px var(--neon-o); }
        .cell.disabled { cursor:not-allowed; opacity:.5; }

        /* Result Overlay */
        .result-overlay {
            display:none;
            position:absolute;
            inset:0;
            background:rgba(5,10,15,.95);
            backdrop-filter:blur(4px);
            border-radius:8px;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:20px;
            z-index:100;
        }

        .result-overlay.show { display:flex; }

        .result-emoji {
            font-size:4rem;
            animation:bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform:translateY(0); }
            50% { transform:translateY(-20px); }
        }

        .result-text {
            font-family:'Orbitron', sans-serif;
            font-size:2rem;
            font-weight:900;
            letter-spacing:.1em;
            text-align:center;
        }

        .result-sub {
            font-family:'Share Tech Mono', monospace;
            font-size:.75rem;
            color:var(--dim);
            letter-spacing:.1em;
        }

        .play-again-btn {
            margin-top:20px;
            padding:12px 24px;
            background:linear-gradient(135deg, var(--neon-o), var(--neon-x));
            border:none;
            border-radius:6px;
            color:#000;
            font-family:'Orbitron', sans-serif;
            font-weight:700;
            font-size:.85rem;
            letter-spacing:.1em;
            cursor:pointer;
            transition:all .3s;
        }

        .play-again-btn:hover {
            transform:scale(1.05);
            box-shadow: 0 0 20px rgba(255,45,107,.5);
        }

        /* Computing Bar */
        .computing-bar {
            display:none;
            position:absolute;
            bottom:30px;
            left:50%;
            transform:translateX(-50%);
            padding:12px 20px;
            background:var(--surface);
            border:1px solid var(--neon-green);
            border-radius:6px;
            display:flex;
            align-items:center;
            gap:12px;
            font-family:'Share Tech Mono', monospace;
            font-size:.75rem;
            color:var(--neon-green);
        }

        .computing-bar.show { display:flex; }

        .spinner {
            width:12px;
            height:12px;
            border:2px solid var(--neon-green);
            border-top-color:transparent;
            border-radius:50%;
            animation:spin .8s linear infinite;
        }

        @keyframes spin {
            to { transform:rotate(360deg); }
        }

        /* Right Panel - API Log */
        .right-panel {
            width:350px;
            border-left:1px solid var(--border);
            display:flex;
            flex-direction:column;
            background:var(--surface);
        }

        .log-header {
            padding:15px;
            border-bottom:1px solid var(--border);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .log-title {
            font-family:'Orbitron', sans-serif;
            font-size:.85rem;
            font-weight:700;
            letter-spacing:.08em;
            display:flex;
            align-items:center;
            gap:8px;
        }

        .log-controls {
            display:flex;
            align-items:center;
            gap:8px;
        }

        .log-count {
            font-family:'Share Tech Mono', monospace;
            font-size:.65rem;
            color:var(--dim);
            letter-spacing:.08em;
        }

        .clear-btn {
            padding:4px 10px;
            background:transparent;
            border:1px solid var(--border);
            border-radius:3px;
            color:var(--dim);
            font-family:'Share Tech Mono', monospace;
            font-size:.6rem;
            cursor:pointer;
            letter-spacing:.08em;
            transition:all .15s;
        }

        .clear-btn:hover {
            border-color:#ff4444;
            color:#ff4444;
        }

        .log-list {
            flex:1;
            overflow-y:auto;
            padding:10px;
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .log-list::-webkit-scrollbar { width:4px; }
        .log-list::-webkit-scrollbar-track { background:transparent; }
        .log-list::-webkit-scrollbar-thumb {
            background:var(--border);
            border-radius:2px;
        }

        .log-empty {
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            height:100%;
            gap:10px;
            color:var(--dim);
            font-family:'Share Tech Mono', monospace;
            font-size:.7rem;
            letter-spacing:.1em;
        }

        .log-empty-icon {
            font-size:2rem;
            opacity:.3;
        }

        /* Log Entry */
        .log-entry {
            border-radius:5px;
            border:1px solid var(--border);
            background:var(--bg);
            overflow:hidden;
            animation: slideInLog .3s ease;
            cursor:pointer;
            transition:border-color .15s;
        }

        .log-entry:hover {
            border-color:rgba(0,229,255,.3);
        }

        @keyframes slideInLog {
            from{opacity:0;transform:translateY(-8px)}
            to{opacity:1;transform:translateY(0)}
        }

        .log-entry-head {
            display:flex;
            align-items:center;
            gap:8px;
            padding:8px 12px;
            font-family:'Share Tech Mono', monospace;
            font-size:.65rem;
            letter-spacing:.06em;
            position:relative;
        }

        .log-method {
            font-weight:700;
            font-size:.6rem;
            padding:2px 6px;
            border-radius:2px;
            letter-spacing:.08em;
        }

        .log-method.POST {
            background:rgba(57,255,20,.15);
            color:var(--neon-green);
        }

        .log-method.GET {
            background:rgba(0,229,255,.15);
            color:var(--neon-o);
        }

        .log-endpoint {
            flex:1;
            color:var(--text);
            font-size:.63rem;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }

        .log-status {
            font-weight:700;
            font-size:.6rem;
            min-width:30px;
            text-align:right;
        }

        .log-status.ok { color:var(--neon-green); }
        .log-status.err { color:var(--neon-x); }
        .log-status.pending { color:var(--dim); }

        .log-footer {
            padding:10px 15px;
            border-top:1px solid var(--border);
            font-family:'Share Tech Mono', monospace;
            font-size:.6rem;
            display:flex;
            justify-content:space-around;
        }

        .log-stats {
            display:flex;
            gap:15px;
            width:100%;
        }

        .log-stat-val {
            font-weight:700;
            color:var(--neon-o);
        }

        .log-stat-val.green { color:var(--neon-green); }
        .log-stat-val.red { color:var(--neon-x); }
    </style>
</head>
<body>

<header>
    <div class="logo">TIC <span>TAC</span> TOE</div>
    <div class="status-bar">
        <div class="status-dot" id="dot"></div>
        <span id="server-status">OFFLINE</span>
    </div>
</header>

<div class="app">
    <div class="left-panel">

        <!-- MENU SCREEN -->
        <div id="menu-screen">
            <div class="menu-title">⚡ ARCADE ⚡</div>
            <div class="menu-subtitle">// SELECT GAME MODE</div>
            <div class="mode-selection">
                <button class="mode-btn" onclick="selectMode('HVH')">
                    <div class="mode-icon">👥</div>
                    <div class="mode-info">
                        <div class="mode-label">HUMAN VS HUMAN</div>
                        <div class="mode-desc">// TWO PLAYERS LOCAL</div>
                    </div>
                    <div class="mode-arrow">→</div>
                </button>
                <button class="mode-btn" onclick="selectMode('HVC')">
                    <div class="mode-icon">🤖</div>
                    <div class="mode-info">
                        <div class="mode-label">HUMAN VS COMPUTER</div>
                        <div class="mode-desc">// PLAY AGAINST THE API AI</div>
                    </div>
                    <div class="mode-arrow">→</div>
                </button>
                <button class="mode-btn" onclick="selectMode('CVC')">
                    <div class="mode-icon">⚡</div>
                    <div class="mode-info">
                        <div class="mode-label">COMPUTER VS COMPUTER</div>
                        <div class="mode-desc">// WATCH THE API BATTLE ITSELF</div>
                    </div>
                    <div class="mode-arrow">→</div>
                </button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen">
            <div class="game-header">
                <button class="back-btn" onclick="goBack()">← MENU</button>
                <div class="mode-badge" id="mode-badge">HVH</div>
            </div>

            <!-- Scoreboard -->
            <div class="scoreboard">
                <div class="score-card x-card">
                    <div class="score-label">PLAYER X</div>
                    <div class="score-val x" id="score-x">0</div>
                </div>
                <div class="score-divider">VS</div>
                <div class="score-card o-card">
                    <div class="score-label">PLAYER O</div>
                    <div class="score-val o" id="score-o">0</div>
                </div>
            </div>

            <!-- Turn display -->
            <div class="turn-display">
                <span style="color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.1em">TURN →</span>
                <span class="turn-marker x" id="turn-marker">X</span>
                <span id="turn-label" style="font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:.08em;color:var(--dim)">PLAYER 1</span>
            </div>

            <!-- Board -->
            <div class="board-wrap">
                <div id="board"></div>
                <div class="result-overlay" id="result-overlay">
                    <div class="result-emoji" id="result-emoji">🏆</div>
                    <div class="result-text" id="result-text">PLAYER X WINS!</div>
                    <div class="result-sub" id="result-sub">// GAME OVER</div>
                    <button class="play-again-btn" onclick="playAgain()">▶ PLAY AGAIN</button>
                </div>
            </div>

            <!-- Computing bar -->
            <div class="computing-bar" id="computing-bar">
                <div class="spinner"></div>
                <span>COMPUTING MOVE...</span>
            </div>
        </div>

    </div><!-- /left-panel -->

    <!-- RIGHT: API LOG PANEL -->
    <div class="right-panel">
        <div class="log-header">
            <div class="log-title">
                <span class="log-title-icon">📡</span>
                API REQUEST LOG
            </div>
            <div class="log-controls">
                <span class="log-count" id="log-count">0 REQUESTS</span>
                <button class="clear-btn" onclick="clearLog()">CLEAR</button>
            </div>
        </div>

        <div class="log-list" id="log-list">
            <div class="log-empty" id="log-empty">
                <div class="log-empty-icon">📭</div>
                <span>NO REQUESTS YET</span>
                <span style="font-size:.6rem;opacity:.5">// START A GAME TO SEE API CALLS</span>
            </div>
        </div>

        <div class="log-footer">
            <div class="log-stats">
                <span>TOTAL <span class="log-stat-val" id="stat-total">0</span></span>
                <span>OK <span class="log-stat-val green" id="stat-ok">0</span></span>
                <span>ERR <span class="log-stat-val red" id="stat-err">0</span></span>
                <span>AVG <span class="log-stat-val" id="stat-avg">—</span></span>
            </div>
        </div>
    </div>

</div><!-- /app -->

<script>
    // ═══════════════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════════════
    const API_BASE = 'http://localhost:8080/api/game';

    // ═══════════════════════════════════════════════
    // STATE - Only UI state, no game logic
    // ═══════════════════════════════════════════════
    let uiState = {
        mode: null,
        gameActive: false,
        scores: { X: 0, O: 0 },
        currentGameState: null,
    };

    // ═══════════════════════════════════════════════
    // LOG STATE
    // ═══════════════════════════════════════════════
    let logEntries = [];
    let logStats = { total:0, ok:0, err:0, durations:[] };

    // ═══════════════════════════════════════════════
    // PING SERVER
    // ═══════════════════════════════════════════════
    async function pingServer() {
        const dot = document.getElementById('dot');
        const lbl = document.getElementById('server-status');
        try {
            const t0 = performance.now();
            const r = await fetch(`${API_BASE}/state`);
            const ms = Math.round(performance.now() - t0);

            if (r.ok) {
                dot.className = 'status-dot online';
                lbl.textContent = `ONLINE (${ms}ms)`;
            } else {
                throw new Error('Server error');
            }
        } catch (e) {
            dot.className = 'status-dot';
            lbl.textContent = 'OFFLINE';
        }
        setTimeout(pingServer, 3000);
    }

    pingServer();

    // ═══════════════════════════════════════════════
    // API CALLS - Frontend ONLY calls backend
    // ═══════════════════════════════════════════════

    async function apiCall(method, endpoint, params = {}) {
        const url = new URL(`${API_BASE}${endpoint}`);

        if (method === 'GET' || method === 'POST') {
            Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
        }

        const logId = Date.now();
        logAPICall(method, endpoint, logId);

        try {
            const t0 = performance.now();
            const response = await fetch(url.toString(), { method });
            const ms = Math.round(performance.now() - t0);
            const data = await response.json();

            updateLogEntry(logId, data, response.status, ms, response.ok);
            return { success: response.ok, data };
        } catch (e) {
            updateLogEntry(logId, { error: e.message }, 'ERROR', 0, false);
            return { success: false, error: e.message };
        }
    }

    // ═══════════════════════════════════════════════
    // GAME FLOW
    // ═══════════════════════════════════════════════

    async function selectMode(mode) {
        uiState.mode = mode;
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('mode-badge').textContent = mode;

        // Start game via backend
        const result = await apiCall('POST', '/start', { mode });
        if (result.success) {
            uiState.currentGameState = result.data;
            renderBoard();
            updateTurnDisplay();

            // If computer starts (HVC mode with O, or CVC), make computer move
            if (mode === 'HVC' && result.data.currentPlayer === 'O') {
                setTimeout(makeComputerMove, 1000);
            } else if (mode === 'CVC') {
                setTimeout(makeComputerMove, 1000);
            }
        }
    }

    async function cellClick(index) {
        if (!uiState.gameActive || uiState.currentGameState.gameOver) return;

        const row = Math.floor(index / 3);
        const col = index % 3;

        // Call backend to make move
        const result = await apiCall('POST', '/move', { position: index });

        if (result.success) {
            uiState.currentGameState = result.data;
            renderBoard();
            updateTurnDisplay();

            // Check if game is over
            if (result.data.gameOver) {
                showGameOver(result.data.winner);
            } else if (uiState.mode !== 'HVH') {
                // If computer's turn, make computer move
                setTimeout(makeComputerMove, 1000);
            }
        }
    }

    async function makeComputerMove() {
        const result = await apiCall('POST', '/move', {});

        if (result.success) {
            uiState.currentGameState = result.data;
            renderBoard();
            updateTurnDisplay();

            if (result.data.gameOver) {
                showGameOver(result.data.winner);
            }
        }
    }

    // ═══════════════════════════════════════════════
    // UI RENDERING - Only display backend data
    // ═══════════════════════════════════════════════

    function renderBoard() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';

        const board = uiState.currentGameState.board;

        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = board[i] === ' ' ? '' : board[i];

            if (board[i] === 'X') {
                cell.classList.add('x');
            } else if (board[i] === 'O') {
                cell.classList.add('o');
            }

            if (board[i] === ' ' && !uiState.currentGameState.gameOver) {
                cell.onclick = () => cellClick(i);
            } else {
                cell.classList.add('disabled');
            }

            boardEl.appendChild(cell);
        }
    }

    function updateTurnDisplay() {
        const current = uiState.currentGameState.currentPlayer;
        const marker = document.getElementById('turn-marker');
        const label = document.getElementById('turn-label');

        marker.textContent = current;
        marker.className = `turn-marker ${current.toLowerCase()}`;
        label.textContent = current === 'X' ? 'PLAYER 1' : 'PLAYER 2';
    }

    function showGameOver(winner) {
        const overlay = document.getElementById('result-overlay');
        const emoji = document.getElementById('result-emoji');
        const text = document.getElementById('result-text');

        if (winner === 'Draw') {
            emoji.textContent = '🤝';
            text.textContent = 'IT\'S A DRAW!';
        } else {
            emoji.textContent = '🏆';
            text.textContent = `PLAYER ${winner} WINS!`;

            if (winner === 'X') {
                uiState.scores.X++;
            } else {
                uiState.scores.O++;
            }

            document.getElementById('score-x').textContent = uiState.scores.X;
            document.getElementById('score-o').textContent = uiState.scores.O;
        }

        overlay.classList.add('show');
    }

    async function playAgain() {
        const result = await apiCall('POST', '/reset', {});
        if (result.success) {
            uiState.currentGameState = result.data;
            document.getElementById('result-overlay').classList.remove('show');
            renderBoard();
            updateTurnDisplay();

            if (uiState.mode === 'HVC' && result.data.currentPlayer === 'O') {
                setTimeout(makeComputerMove, 1000);
            } else if (uiState.mode === 'CVC') {
                setTimeout(makeComputerMove, 1000);
            }
        }
    }

    function goBack() {
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('game-screen').style.display = 'none';
        uiState.mode = null;
        uiState.gameActive = false;
        logEntries = [];
        logStats = { total:0, ok:0, err:0, durations:[] };
        renderLog();
    }

    // ═══════════════════════════════════════════════
    // API LOG FUNCTIONS
    // ═══════════════════════════════════════════════

    function logAPICall(method, endpoint, id) {
        const entry = {
            id,
            method,
            endpoint,
            statusText: 'pending',
            resBody: null,
            ms: 0,
            ok: null,
            ts: new Date()
        };
        logEntries.unshift(entry);
        renderLog();
    }

    function updateLogEntry(id, resBody, statusText, ms, ok) {
        const e = logEntries.find(e => e.id === id);
        if (!e) return;

        e.resBody = resBody;
        e.statusText = statusText;
        e.ms = ms;
        e.ok = ok;

        logStats.total++;
        if (ok) logStats.ok++; else logStats.err++;
        logStats.durations.push(ms);

        renderLog();
        renderStats();
    }

    function renderLog() {
        const list = document.getElementById('log-list');
        const empty = document.getElementById('log-empty');
        document.getElementById('log-count').textContent =
            `${logStats.total} REQUEST${logStats.total !== 1 ? 'S' : ''}`;

        if (logEntries.length === 0) {
            list.innerHTML = '';
            list.appendChild(empty);
            return;
        }

        if (empty.parentNode) empty.parentNode.removeChild(empty);

        const firstId = logEntries[0].id;
        const existing = document.getElementById(`log-${firstId}`);
        if (existing) {
            existing.replaceWith(buildEntryEl(logEntries[0]));
        } else {
            list.prepend(buildEntryEl(logEntries[0]));
        }

        logEntries.forEach(e => {
            const el = document.getElementById(`log-${e.id}`);
            if (!el) return;
            const statusEl = el.querySelector('.log-status');
            if (!statusEl) return;

            if (e.statusText === 'pending') {
                statusEl.className = 'log-status pending';
                statusEl.textContent = '...';
            } else if (e.ok) {
                statusEl.className = 'log-status ok';
                statusEl.textContent = e.statusText;
            } else {
                statusEl.className = 'log-status err';
                statusEl.textContent = e.statusText;
            }
        });
    }

    function buildEntryEl(e) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.id = `log-${e.id}`;

        const ts = e.ts.toTimeString().slice(0,8);
        const statusClass = e.statusText === 'pending' ? 'pending' : (e.ok ? 'ok' : 'err');
        const statusText = e.statusText === 'pending' ? '...' : e.statusText;
        const barW = e.ms ? Math.min(100, (e.ms / 2000) * 100) : 0;

        div.innerHTML = `
            <div class="log-entry-head">
                <span class="log-method ${e.method}">${e.method}</span>
                <span class="log-endpoint">${e.endpoint}</span>
                <span class="log-status ${statusClass}">${statusText}</span>
            </div>
            <div style="padding:0 12px 8px;font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--dim);display:flex;gap:8px;">
                <span>${ts}</span>
                <span>${e.ms}ms</span>
                <div style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
                    <div style="height:100%;width:${barW}%;background:linear-gradient(90deg,var(--neon-o),var(--neon-x));"></div>
                </div>
            </div>
        `;

        return div;
    }

    function renderStats() {
        document.getElementById('stat-total').textContent = logStats.total;
        document.getElementById('stat-ok').textContent = logStats.ok;
        document.getElementById('stat-err').textContent = logStats.err;

        if (logStats.durations.length > 0) {
            const avg = Math.round(logStats.durations.reduce((a,b) => a+b) / logStats.durations.length);
            document.getElementById('stat-avg').textContent = avg + 'ms';
        }
    }

    function clearLog() {
        logEntries = [];
        logStats = { total:0, ok:0, err:0, durations:[] };
        renderLog();
        renderStats();
    }
</script>

</body>
</html>
